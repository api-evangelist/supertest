aid: supertest
name: SuperTest
description: >-
  SuperTest is a Node.js library for testing HTTP servers by providing a high-level
  abstraction for HTTP assertions with a fluent API built on SuperAgent. Maintained
  by the Forward Email / ladjs open source organization, SuperTest allows developers
  to pass any http.Server or Express/Koa application and test HTTP requests and
  responses with chained assertions. It is widely used with Mocha, Jest, and other
  JavaScript testing frameworks for integration and end-to-end API testing.
